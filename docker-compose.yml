services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: omni_ad
      POSTGRES_USER: omni_ad
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omni_ad_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omni_ad"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

